<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash">
        <div class="splash-content">
            <img src="/static/img/icon.png" alt="SyncLab" class="splash-logo" width="140" height="140">
            <span class="splash-version" id="splashVersion">v...</span>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-emojis">🎬🎶✅</span>
            <h1>SyncLab</h1>
            <span class="version-badge" id="versionBadge">v1.2</span>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="settingsBtn" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">

        <!-- Input Section -->
        <section class="input-section" id="inputSection">
            <div class="section-title">
                <span class="section-label">SELECT FOLDERS</span>
                <span class="section-hint">Drag folders here or use Browse Folder</span>
            </div>

            <div class="input-cards">
                <!-- Video Card -->
                <div class="input-card" id="videoCard">
                    <div class="card-header">
                        <div class="card-icon video-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        </div>
                        <span class="card-label">VIDEO</span>
                        <span class="card-count" id="videoCount"></span>
                    </div>
                    <div class="path-display" id="videoPathInput" tabindex="0">
                        <span class="path-placeholder">Click Browse Folder or drag here</span>
                    </div>
                    <button class="btn-browse" data-target="videoPathInput">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        Browse Folder
                    </button>
                </div>

                <!-- Audio Card -->
                <div class="input-card" id="audioCard">
                    <div class="card-header">
                        <div class="card-icon audio-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </div>
                        <span class="card-label">AUDIO</span>
                        <span class="card-count" id="audioCount"></span>
                    </div>
                    <div class="path-display" id="audioPathInput" tabindex="0">
                        <span class="path-placeholder">Click Browse Folder or drag here</span>
                    </div>
                    <button class="btn-browse" data-target="audioPathInput">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        Browse Folder
                    </button>
                </div>
            </div>
        </section>

        <!-- Sync Button -->
        <section class="sync-section" id="syncControls">
            <button class="btn-sync" id="syncBtn" disabled>
                <svg class="btn-sync-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                SYNCHRONIZE
            </button>
        </section>

        <!-- Progress Section -->
        <section class="progress-section" id="progressSection" style="display:none">
            <div class="progress-card">
                <div class="progress-card-header">
                    <span class="progress-label">OVERALL PROGRESS</span>
                    <span class="progress-percent" id="overallPercent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill overall-fill" id="overallBar" style="width:0%"></div>
                </div>
                <div class="progress-detail" id="overallDetail">Preparing...</div>
            </div>

            <div class="progress-card progress-card-step">
                <div class="progress-card-header">
                    <span class="progress-label">CURRENT STEP</span>
                    <span class="progress-percent" id="stepPercent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill step-fill" id="stepBar" style="width:0%"></div>
                </div>
                <div class="progress-detail" id="stepDetail">Initializing...</div>
            </div>

            <button class="btn-cancel" id="cancelBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Cancel
            </button>
        </section>

        <!-- Results Section -->
        <section class="results-section" id="resultsSection" style="display:none">
            <div class="results-header">
                <span class="section-label">RESULTS</span>
                <div class="results-stats" id="resultsSummary"></div>
            </div>
            <div class="results-list" id="resultsList"></div>
            <div class="results-actions">
                <button class="btn-primary btn-export" id="exportBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export XML
                </button>
                <button class="btn-ghost btn-support-export" id="supportExportBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Export Support Package
                </button>
                <button class="btn-ghost" id="newSyncBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                    New Sync
                </button>
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal-backdrop" id="settingsModal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="btn-icon btn-close" id="closeSettings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>FRAME RATE (FPS)</label>
                    <input type="number" id="settingFps" value="29.97" step="0.001">
                </div>
                <div class="field">
                    <label>RESOLUTION</label>
                    <div class="field-row">
                        <input type="number" id="settingWidth" value="1920">
                        <span class="field-sep">&times;</span>
                        <input type="number" id="settingHeight" value="1080">
                    </div>
                </div>
                <div class="field">
                    <label>CONFIDENCE THRESHOLD</label>
                    <input type="number" id="settingThreshold" value="0.05" step="0.01" min="0" max="1">
                </div>
                <div class="field">
                    <label>VIDEO EXTENSIONS</label>
                    <input type="text" id="settingVideoExt" value=".mov, .mp4, .mxf, .avi">
                </div>
                <div class="field">
                    <label>AUDIO EXTENSIONS</label>
                    <input type="text" id="settingAudioExt" value=".wav">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" id="resetSettings">Reset Defaults</button>
                <button class="btn-primary" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
